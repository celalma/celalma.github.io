<svg width="1700" height="460" viewBox="0 0 1700 460" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdfefc"/>
      <stop offset="40%" stop-color="#f4fbf8"/>
      <stop offset="100%" stop-color="#e3f3ee"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ac7b5"/>
      <stop offset="100%" stop-color="#5ab3a2"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- Cloud shape -->
    <symbol id="cloud" viewBox="0 0 200 80">
      <path
        d="M35 60
           C20 60 10 50 10 38
           C10 25 20 15 33 15
           C37 8 45 4 54 4
           C66 4 76 11 80 22
           C86 18 94 16 102 16
           C120 16 135 29 135 46
           C135 55 130 63 122 67
           L35 67 Z"
        fill="white"
        opacity="0.9"
      />
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1700" height="460" fill="url(#bgGrad)" rx="32" />

  <!-- Soft abstract shapes -->
  <ellipse cx="260" cy="90" rx="220" ry="120" fill="#bfe6dd" opacity="0.35"/>
  <ellipse cx="1450" cy="380" rx="260" ry="140" fill="#bfe6dd" opacity="0.25"/>
  <ellipse cx="900" cy="40" rx="260" ry="120" fill="#ffffff" opacity="0.35"/>

  <!-- Clouds -->
  <use href="#cloud" x="260" y="60" width="200" height="80" opacity="0.8"/>
  <use href="#cloud" x="1150" y="40" width="220" height="90" opacity="0.7"/>
  <use href="#cloud" x="820" y="90" width="180" height="70" opacity="0.6"/>

  <!-- Palm tree group -->
  <g transform="translate(260, 260)" filter="url(#softShadow)">
    <!-- Trunk -->
    <path
      d="M0 0
         C 10 40, 15 90, 18 150
         C 20 190, 18 220, 15 250
         L -5 250
         C -2 210, -3 180, -6 140
         C -10 90, -12 50, -10 0 Z"
      fill="#7a5b3a"
      opacity="0.95"
    />

    <!-- Leaves -->
    <g fill="url(#accentGrad)">
      <path
        d="M5 -5
           C 40 -40, 90 -55, 140 -50
           C 100 -30, 70 -10, 30 5 Z"
        opacity="0.95"
      />
      <path
        d="M0 -10
           C -30 -40, -80 -55, -130 -50
           C -90 -30, -60 -10, -20 5 Z"
        opacity="0.9"
      />
      <path
        d="M5 -8
           C 30 -60, 40 -95, 35 -130
           C 20 -95, 10 -70, -5 -35 Z"
        opacity="0.9"
      />
      <path
        d="M0 -5
           C -10 -45, -35 -75, -70 -95
           C -50 -65, -35 -40, -15 -15 Z"
        opacity="0.9"
      />
      <path
        d="M8 -3
           C 35 -35, 70 -55, 105 -65
           C 80 -40, 55 -20, 25 -5 Z"
        opacity="0.9"
      />
    </g>

    <!-- Ground -->
    <ellipse cx="10" cy="260" rx="90" ry="26" fill="#d3e7e1" opacity="0.9"/>
    <ellipse cx="10" cy="260" rx="70" ry="18" fill="#f4fbf8" opacity="0.9"/>
  </g>

  <!-- Manilla text -->
  <g transform="translate(520, 250)" filter="url(#softShadow)">
    <!-- Main word -->
    <text
      x="0"
      y="0"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="96"
      font-weight="700"
      letter-spacing="0.12em"
      textLength="700"
      fill="#1f3b3a"
    >
      MANILLA
    </text>

    <!-- Accent underline pill -->
    <rect
      x="4"
      y="20"
      width="360"
      height="18"
      rx="9"
      fill="#bfe6dd"
      opacity="0.9"
    />

    <!-- Tagline -->
    <text
      x="6"
      y="70"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="24"
      font-weight="400"
      fill="#6b8a88"
    >
      soft coastal music player
    </text>
  </g>

  <!-- Small pill on right for balance -->
  <g transform="translate(1320, 180)" opacity="0.9">
    <rect
      x="0"
      y="0"
      width="220"
      height="70"
      rx="35"
      fill="#ffffff"
      stroke="#d3e7e1"
    />
    <circle cx="45" cy="35" r="18" fill="url(#accentGrad)" opacity="0.95"/>
    <path
      d="M40 35 L44 39 L52 30"
      fill="none"
      stroke="#ffffff"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <text
      x="75"
      y="41"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="18"
      fill="#1f3b3a"
    >
      Now playing
    </text>
  </g>
</svg>
